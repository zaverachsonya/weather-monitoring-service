<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Прогноз - <span th:text="${city}"></span></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .city-name-highlight {
            color: #004aad;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .forecast-card {
            background: white;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            overflow: hidden;
        }
        .forecast-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* Стиль для даты (как плашка) */
        .date-box {
            background: #f0f4f8;
            color: #495057;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        .temp-val {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0d6efd;
            margin: 10px 0;
        }

        .condition-text {
            color: #6c757d;
            font-size: 0.85rem;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }
        .back-btn:hover {
            background-color: #0d6efd;
            color: white !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex align-items-center mb-5">
        <a href="/" class="btn btn-outline-primary back-btn me-3 text-primary shadow-sm" title="Вернуться назад">
            <i class="bi bi-arrow-left fs-4"></i>
        </a>
        <h1 class="m-0 fw-bold">
            Прогноз на 5 дней:
            <span class="city-name-highlight" th:text="${city}">Нью-Йорк</span>
        </h1>
    </div>

    <!-- карточки -->
    <div class="row row-cols-1 row-cols-md-5 g-4">
        <div class="col" th:each="d : ${days}">
            <div class="card h-100 shadow-sm forecast-card text-center p-4">


                <div class="date-box">
                    <i class="bi bi-calendar-event me-1"></i>
                    <span th:text="${d.date.substring(8,10) + '.' + d.date.substring(5,7)}">Дата</span>
                </div>

                <img th:src="@{'http://openweathermap.org/img/wn/' + ${d.icon} + '@2x.png'}"
                     class="mx-auto" style="width: 100px;" alt="weather icon">

                <div class="temp-val" th:text="${#numbers.formatDecimal(d.temp, 1, 1) + '°C'}">25°C</div>

                <div class="condition-text text-capitalize fw-medium" th:text="${d.description}">
                    ясно
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
