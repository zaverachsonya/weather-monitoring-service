<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f2f4f7; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2 class="text-center fw-bold mb-4" style="color: #004aad;">Вход</h2>
    <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Логин" required></div>
        <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Пароль" required></div>
        <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
        <div class="text-center mt-3"><a href="/register" class="text-decoration-none">Создать аккаунт</a></div>
    </form>
</div>
</body>
</html>
