<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container card p-4 shadow-sm" style="max-width: 400px;">
    <h2 class="text-center mb-4">Регистрация</h2>

    <div th:if="${param.error}" class="alert alert-danger">Логин уже занят!</div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Придумайте логин" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Придумайте пароль" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        <p class="mt-3 text-center">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </form>
</div>
</body>
</html>
